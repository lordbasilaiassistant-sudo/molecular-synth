[pytest]
# The molsynth tests are pure unittest over the compiler. Some globally-installed
# pytest plugins (pytest-base-url, pytest-tornado) inject a function-scoped `base_url`
# fixture that collides with pytest's session-scoped collection here and aborts every
# test with a ScopeMismatch. We use neither, so disable them up front -- `pytest` then
# works out of the box from the repo root with no extra flags.
addopts = -p no:base_url -p no:tornado
testpaths = tests
python_files = test_*.py
